version: '3.8'
services:
  kuttai-arabic:
    build: .
    ports:
      - "5000:5000"
      - "7860:7860"
    volumes:
      - ./results:/app/results
      - ./characters:/app/characters
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
